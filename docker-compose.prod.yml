version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enviroswarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-enviroswarm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - enviroswarm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enviroswarm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - enviroswarm_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-enviroswarm}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-enviroswarm}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - enviroswarm_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web-dashboard/dist:/var/www/enviroswarm:ro
    depends_on:
      - backend
    networks:
      - enviroswarm_net

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./data-pipeline/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    networks:
      - enviroswarm_net

  backup:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "while true; do
        sleep 86400
        PGPASSWORD=${POSTGRES_PASSWORD:-changeme} pg_dump -h db -U ${POSTGRES_USER:-enviroswarm} ${POSTGRES_DB:-enviroswarm} > /backups/backup-$$(date +%Y%m%d-%H%M%S).sql
        find /backups -name '*.sql' -mtime +7 -delete
      done"
    volumes:
      - ./backups:/backups
    depends_on:
      - db
    networks:
      - enviroswarm_net

volumes:
  pg_data:
  mqtt_data:

networks:
  enviroswarm_net:
    driver: bridge