name: CD / Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          ssh $DEPLOY_USER@$DEPLOY_HOST "cd /opt/enviroswarm && ./scripts/deploy.sh backend"

  deploy-web:
    name: Deploy Web Dashboard
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json
      - name: Build for production
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd web-dashboard
          npm ci
          npm run build
      - name: Upload to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
          rsync -avz --delete web-dashboard/dist/ $DEPLOY_USER@$DEPLOY_HOST:/var/www/enviroswarm/

  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-backend, deploy-web]
    steps:
      - name: Health check
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          curl -sf "$API_URL/api/v1/health" || exit 1
          curl -sf "$API_URL/api/v1/pricing" || exit 1
          echo "Smoke tests passed"