name: Build Android APK (Local Docker)

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./android-app/package-lock.json

      - name: Install dependencies
        working-directory: ./android-app
        run: npm ci

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Expo CLI
        working-directory: ./android-app
        run: npx expo prebuild --platform android --no-install

      - name: Build APK with Gradle
        working-directory: ./android-app/android
        run: ./gradlew assembleRelease

      - name: Copy APK artifact
        run: |
          mkdir -p ./output
          cp ./android-app/android/app/build/outputs/apk/release/app-release.apk ./output/enviroswarm.apk

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.run_number }}
          name: ENViroSwarm APK v${{ github.run_number }}
          files: ./output/enviroswarm.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.
            Download and install on Android devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to FTP
        run: |
          if [ -n "${{ secrets.FTP_HOST }}" ]; then
            curl -T ./output/enviroswarm.apk \
              ftp://${{ secrets.FTP_HOST }}/public_html/enviroswarm/apk/enviroswarm.apk \
              --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}"
          fi
