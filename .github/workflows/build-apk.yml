name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./android-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK artifact
        run: |
          # EAS Build outputs a URL to the artifact
          BUILD_URL=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o enviroswarm.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-${{ github.run_number }}
          name: ENViroSwarm APK Build ${{ github.run_number }}
          files: ./android-app/enviroswarm.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.
            Download and install on Android devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to FTP
        run: |
          curl -T ./android-app/enviroswarm.apk \
            ftp://${{ secrets.FTP_HOST }}/public_html/enviroswarm/apk/enviroswarm.apk \
            --user "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}"
        if: env.FTP_HOST != ''
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
