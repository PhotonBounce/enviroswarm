name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./android-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --non-interactive --json | jq -r '.[0].artifacts.buildUrl')
          echo "Build URL: $BUILD_URL"
          curl -L "$BUILD_URL" -o ../enviroswarm.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.run_number }}
          name: ENViroSwarm APK v${{ github.run_number }}
          files: ./enviroswarm.apk
          body: |
            Automated APK build from commit ${{ github.sha }}.
            Download and install on Android devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to FTP
        run: |
          if [ -n "$FTP_HOST" ]; then
            curl -T ../enviroswarm.apk \
              ftp://$FTP_HOST/public_html/enviroswarm/apk/enviroswarm.apk \
              --user "$FTP_USER:$FTP_PASS"
          fi
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
