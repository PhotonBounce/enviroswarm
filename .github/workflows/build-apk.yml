name: Android App CI

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./android-app/package-lock.json

      - name: Install dependencies
        working-directory: ./android-app
        run: npm ci

      - name: TypeScript check
        working-directory: ./android-app
        run: npx tsc --noEmit

      - name: Expo web preview build
        working-directory: ./android-app
        run: npx expo export --platform web
        # This builds a web preview that can be deployed to shared hosting
        # For APK builds, see docs/APK_BUILD.md

      - name: Upload web preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-web-preview
          path: ./android-app/dist

      - name: Build status summary
        run: |
          echo "✅ Android app validation passed"
          echo "⚠️  APK build is intentionally skipped in CI"
          echo "📖 See docs/APK_BUILD.md for how to build APK locally or via EAS"
