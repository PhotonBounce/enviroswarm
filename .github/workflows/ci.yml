name: CI / Test & Build

on:
  push:
    branches: [main, 'agent/*']
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: enviroswarm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/enviroswarm_test
          SECRET_KEY: test-secret-key-32-chars-long
        run: |
          cd backend
          pytest tests/ -v --tb=short

  web-dashboard-build:
    name: Web Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json
      - name: Install dependencies
        run: |
          cd web-dashboard
          npm ci
      - name: Build
        run: |
          cd web-dashboard
          npm run build

  android-lint:
    name: Android App TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: android-app/package-lock.json
      - name: Install dependencies
        run: |
          cd android-app
          npm ci
      - name: TypeScript check
        run: |
          cd android-app
          npx tsc --noEmit

  data-pipeline-check:
    name: Data Pipeline Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd data-pipeline
          pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile data-pipeline/seed_demo.py
          python -m py_compile data-pipeline/generators/*.py
          python -m py_compile data-pipeline/mqtt/*.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit (Python)
        run: |
          pip install bandit
          bandit -r backend/app/ -f json -o bandit-report.json || true
          bandit -r backend/app/ -ll
      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins > .secrets.baseline.json || true
          cat .secrets.baseline.json | grep -i "secrets" || echo "No secrets detected in baseline"