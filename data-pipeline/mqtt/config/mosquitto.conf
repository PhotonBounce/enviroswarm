listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

# WARNING: allow_anonymous true is acceptable for local development only.
# For production, set allow_anonymous false and configure password_file + acl_file.

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# For demo only — no auth required
