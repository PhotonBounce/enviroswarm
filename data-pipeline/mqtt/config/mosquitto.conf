listener 1883
protocol mqtt

listener 9001
protocol websockets

# WARNING: This configuration is for LOCAL DEVELOPMENT ONLY.
# It allows anonymous connections and has no TLS.
# Do not use on any shared network without switching to mosquitto.conf.production
# and configuring authentication and TLS.
allow_anonymous true

# To require authentication, uncomment the following line and generate a password file:
#   mosquitto_passwd -c /mosquitto/config/passwd <username>
# password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# For demo only — no auth required
