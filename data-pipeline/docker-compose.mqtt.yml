services:
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: enviroswarm-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/log:/mosquitto/log
    user: "1883:1883"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-p", "1883", "-t", "health", "-m", "check", "-d"]
      interval: 10s
      timeout: 5s
      retries: 3

# To start: docker-compose -f docker-compose.mqtt.yml up -d
# To stop:  docker-compose -f docker-compose.mqtt.yml down
